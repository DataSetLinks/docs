      tags:
        - autorag
      summary: Run AutoRAG agent over all data
      description: Uses the AutoRAG agent to answer a question about any data that the user can access.
      operationId: autorag
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AutoRagRequest"
        required: true
      responses:
        "200":
          $ref: "#/components/responses/AutoRagResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /query/ask:
    post:
      tags:
        - autorag
      summary: Run AutoRAG agent with streaming response
      description: |
        Uses the AutoRAG agent to answer a question about any data that the user can access.
        Returns results as a Server-Sent Events (SSE) stream with incremental updates.

        The stream emits the following event types in order:
        - `plan`: The execution plan with a list of steps to be performed.
        - `step`: One event per step, containing the instruction, query, and result data.
        - `answer`: The final synthesized answer to the user's question.
        - `error`: Emitted if an error occurs during processing (instead of answer).
      operationId: autoragStream
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AutoRagRequest"
        required: true
      responses:
        "200":
          $ref: "#/components/responses/AutoRagStreamResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /query/runs/{runId}:
    get:
      tags:
        - agentRuns
      summary: Get the status of an agent run
      description: |
        Returns the current status of an agent run, the original question, and (for completed
        runs) the rendered result. Use this to discover whether a run is still running, completed,
        failed, or expired (e.g. after a dropped SSE connection).
      operationId: getAgentRunStatus
      parameters:
        - name: runId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Run status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentRunStatusResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags:
        - agentRuns
      summary: Delete an agent run and any resume cache associated with it
      description: |
        Permanently removes the run record and its checkpoint blob. Returns 404 for both
        "never existed" and "owned by someone else" to avoid leaking existence of other
        users' conversations.
      operationId: deleteAgentRun
      parameters:
        - name: runId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Deleted.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /query/runs/{runId}/resume:
    post:
      tags:
        - agentRuns
      summary: Resume a previously paused or crashed agent run
      description: |
        Resumes a run from its last checkpoint. The response is an SSE stream whose first
        event is `run-started`, followed by the same domain events as the original streaming
        endpoint (e.g. `plan`, `step`, `answer` for AutoRag).

        Concurrency: each call rotates the run's session id. If a second resume request
        arrives while a first is in flight, the first wrapper exits silently on its next
        checkpoint write; only the latest resume continues streaming events to its caller.

        Terminal states are surfaced via HTTP status codes:
          - 410 Gone: run is Completed (the final answer is in the body) OR Expired
            (its resume cache is gone or no longer loadable). The body carries the original
            question and, for Completed runs, the rendered result.
          - 422 Unprocessable Content: run is in a Failed state
          - 404 Not Found: run does not exist or is not owned by the caller
      operationId: resumeAgentRun
      parameters:
        - name: runId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: SSE stream of lifecycle and domain events for the resumed run.
          content:
            text/event-stream:
              schema:
                type: string
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "410":
          description: Run is already completed or its checkpoint expired.
        "422":
          description: Run is in a failed state.
