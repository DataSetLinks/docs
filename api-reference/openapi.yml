openapi: 3.0.3
info:
  title: DataLinks
  version: 1.0.0
servers:
  - url: https://api.datalinks.com/api/v1
    description: production server
security:
  - bearerAuth: []
  - openId:
      - implicit
paths:
  /a2a:
    get:
      tags:
        - a2a
      summary: List the agents exposed over A2A
      description: "Convenience listing of the available A2A agents and their AgentCard URLs. Public, no authentication."
      operationId: listA2aAgents
      responses:
        "200":
          description: The available A2A agents.
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  additionalProperties: true
      security: []
  /a2a/{agentName}/.well-known/agent-card.json:
    get:
      tags:
        - a2a
      summary: Fetch an agent's AgentCard
      description: |
        Returns the A2A AgentCard describing the agent's skills, capabilities, security schemes and JSON-RPC
        endpoint. Public (unauthenticated) discovery document.
      operationId: getA2aAgentCard
      parameters:
        - name: agentName
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: The A2A AgentCard (see https://a2a-protocol.org for the schema).
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "404":
          $ref: "#/components/responses/NotFound"
      security: []
  /a2a/{agentName}:
    post:
      tags:
        - a2a
      summary: A2A JSON-RPC endpoint for an agent
      description: |
        JSON-RPC 2.0 endpoint implementing the A2A methods `SendMessage`, `SendStreamingMessage`, `GetTask`,
        `CancelTask` and `GetExtendedAgentCard`. `SendStreamingMessage` responds with `text/event-stream`; the others
        with a single JSON-RPC response. `GetExtendedAgentCard` returns the authenticated, richer AgentCard.
        Protocol errors are returned as JSON-RPC error objects with HTTP 200. The target namespace is supplied
        in the message `metadata.namespace`; the acting user is taken from the bearer token.
        Request and response bodies follow the A2A 1.0 spec (https://a2a-protocol.org).
      operationId: a2aJsonRpc
      parameters:
        - name: agentName
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
        required: true
      responses:
        "200":
          description: "A JSON-RPC response, or (for SendStreamingMessage) an SSE stream of JSON-RPC responses."
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
            text/event-stream:
              schema:
                type: string
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /agents/cleaning/{cleaningTaskId}/code:
    get:
      tags:
        - agents
      summary: Get code files for a cleaning task
      description: Retrieve metadata for all code files generated by the cleaning agent for the specified task.
      operationId: getCleaningTaskCode
      parameters:
        - name: cleaningTaskId
          in: path
          description: The unique identifier of the cleaning task.
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: List of code file metadata for the cleaning task.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CleanerAgentCodeFile"
        "404":
          description: The cleaning task does not exist.
  /agents/{username}/{namespace}/{datasetName}/requestCleaning:
    post:
      tags:
        - agents
      summary: Request cleaning on a dataset
      description: Request a cleaning job for the specified dataset.
      operationId: requestCleaning
      parameters:
        - name: namespace
          in: path
          description: Namespace for the dataset.
          required: true
          schema:
            type: string
          example: cinematography
        - name: datasetName
          in: path
          description: Name of the dataset.
          required: true
          schema:
            type: string
          examples:
            movies:
              summary: Movies
              value: movies
            actors:
              summary: Actors
              value: actors
        - name: username
          in: path
          description: The username associated with the request.
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RequestCleaningRequest"
        required: true
      responses:
        "201":
          description: Schedules a new cleaning task.
        "400":
          description: Request body is invalid or malformed JSON.
        "404":
          description: The dataset does not exist or the user cannot modify it.
        "409":
          description: A dataset with the specified name already exists in the target namespace.
        "422":
          $ref: "#/components/responses/UnprocessableContent"
  /data:
    get:
      tags:
        - datasets
      summary: Fetch datasets
      description: Retrieve all available datasets.
      operationId: getDatasets
      responses:
        "200":
          $ref: "#/components/responses/ListOfDatasets"
        "401":
          $ref: "#/components/responses/Unauthorized"
      deprecated: true
  /data/{namespace}:
    get:
      tags:
        - datasets
      summary: Fetch datasets in namespace
      description: Retrieve all datasets for the specified namespace.
      operationId: getDatasetsInNamespace
      parameters:
        - name: namespace
          in: path
          description: Namespace for the dataset.
          required: true
          schema:
            type: string
          example: cinematography
      responses:
        "200":
          $ref: "#/components/responses/ListOfDatasets"
        "401":
          $ref: "#/components/responses/Unauthorized"
      deprecated: true
  /data/{username}/{namespace}/{datasetName}/ingest/attempts:
    get:
      tags:
        - data
      summary: List ingestions for a dataset
      description: Lists ingestion attempts for a dataset.
      operationId: listIngestions
      parameters:
        - name: namespace
          in: path
          description: Namespace for the dataset.
          required: true
          schema:
            type: string
          example: cinematography
        - name: datasetName
          in: path
          description: Name of the dataset.
          required: true
          schema:
            type: string
          examples:
            movies:
              summary: Movies
              value: movies
            actors:
              summary: Actors
              value: actors
        - name: username
          in: path
          description: The username associated with the request.
          required: true
          schema:
            type: string
        - name: beforeCreatedAt
          in: query
          description: Value of the `created_at` field before or equals which to return ingestions.
          schema:
            type: string
            format: date-time
            example: 2024-03-01T14:30:22Z
        - name: pageSize
          in: query
          description: Maximum number of results to return.
          schema:
            maximum: 100
            minimum: 1
            type: integer
            default: 25
      responses:
        "200":
          description: Returns ingestion records for the specified dataset.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListIngestionsResponseData"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /data/{username}/{namespace}/{datasetName}:
    get:
      tags:
        - dataset
      summary: Get dataset information
      description: "Get dataset metadata for the specified user, namespace, and dataset."
      operationId: getDatasetInformation
      parameters:
        - name: namespace
          in: path
          description: Namespace for the dataset.
          required: true
          schema:
            type: string
          example: cinematography
        - name: datasetName
          in: path
          description: Name of the dataset.
          required: true
          schema:
            type: string
          examples:
            movies:
              summary: Movies
              value: movies
            actors:
              summary: Actors
              value: actors
        - name: username
          in: path
          description: The username associated with the request.
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Returns dataset metadata.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DatasetResponse"
        "404":
          description: The dataset was not found.
        "400":
          description: Bad request
  /data/{username}/{namespace}/rename:
    post:
      tags:
        - dataset
      summary: Rename a namespace
      description: Rename the specified namespace.
      operationId: renameNamespace
      parameters:
        - name: namespace
          in: path
          description: Namespace for the dataset.
          required: true
          schema:
            type: string
          example: cinematography
        - name: username
          in: path
          description: The username associated with the request.
          required: true
          schema:
            type: string
      requestBody:
        content:
          text/plain:
            schema:
              type: string
        required: true
      responses:
        "200":
          description: Renames the specified namespace.
        "400":
          description: Bad request
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: The namespace was not found or the user cannot modify it.
  /data/{username}/{namespace}/{datasetName}/rename:
    post:
      tags:
        - dataset
      summary: Rename a dataset
      description: Rename the specified dataset.
      operationId: renameDataset
      parameters:
        - name: namespace
          in: path
          description: Namespace for the dataset.
          required: true
          schema:
            type: string
          example: cinematography
        - name: datasetName
          in: path
          description: Name of the dataset.
          required: true
          schema:
            type: string
          examples:
            movies:
              summary: Movies
              value: movies
            actors:
              summary: Actors
              value: actors
        - name: username
          in: path
          description: The username associated with the request.
          required: true
          schema:
            type: string
      requestBody:
        content:
          text/plain:
            schema:
              type: string
        required: true
      responses:
        "200":
          description: Renames the specified dataset.
        "400":
          description: Bad request
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: The dataset was not found or the user cannot modify it.
  /data/{username}/{namespace}/{datasetName}/inferDefinition:
    put:
      tags:
        - dataset
      summary: Update inference definition
      description: Update the saved inference definition for the dataset.
      operationId: updateInferDefinition
      parameters:
        - name: namespace
          in: path
          description: Namespace for the dataset.
          required: true
          schema:
            type: string
          example: cinematography
        - name: datasetName
          in: path
          description: Name of the dataset.
          required: true
          schema:
            type: string
          examples:
            movies:
              summary: Movies
              value: movies
            actors:
              summary: Actors
              value: actors
        - name: username
          in: path
          description: The username associated with the request.
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                dataDescription:
                  $ref: "#/components/schemas/DataDescription"
                schemaDefinition:
                  $ref: "#/components/schemas/SchemaDefinition"
        required: true
      responses:
        "201":
          description: Creates a new inference definition.
        "404":
          description: The dataset was not found or the user cannot modify it.
        "400":
          description: Bad request
  /data/{username}/{namespace}/{datasetName}/clear:
    post:
      tags:
        - dataset
      summary: Clear all data for a dataset
      description: Remove all data and links from the specified dataset. This action is irreversible.
      operationId: clearDataset
      parameters:
        - name: namespace
          in: path
          description: Namespace for the dataset.
          required: true
          schema:
            type: string
          example: cinematography
        - name: datasetName
          in: path
          description: Name of the dataset.
          required: true
          schema:
            type: string
          examples:
            movies:
              summary: Movies
              value: movies
            actors:
              summary: Actors
              value: actors
        - name: username
          in: path
          description: The username associated with the request.
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Removes all data and links from the dataset.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: The dataset was not found or the user cannot modify it.
  /data/{username}/{namespace}/{datasetName}/balefire:
    delete:
      tags:
        - dataset
      summary: Delete all data and metadata for a dataset (balefire)
      description: "Remove all data, links, and metadata for the specified dataset. This action is irreversible."
      operationId: balefireDataset
      parameters:
        - name: namespace
          in: path
          description: Namespace for the dataset.
          required: true
          schema:
            type: string
          example: cinematography
        - name: datasetName
          in: path
          description: Name of the dataset.
          required: true
          schema:
            type: string
          examples:
            movies:
              summary: Movies
              value: movies
            actors:
              summary: Actors
              value: actors
        - name: username
          in: path
          description: The username associated with the request.
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deletes the dataset and all related data.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: The dataset was not found or the user cannot modify it.
  /infer/preview:
    post:
      tags:
        - ingest
      summary: Preview
      description: Process data using ingestion logic without saving it to a dataset.
      operationId: previewInfer
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IngestRequest"
            examples:
              movies:
                $ref: "#/components/examples/moviesExample"
              actors:
                $ref: "#/components/examples/actorsExample"
        required: true
      responses:
        "200":
          description: Returns the processed preview data.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IngestPreviewResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /infer/description:
    post:
      tags:
        - ingest
      summary: Infer dataset description
      description: Ask an agent to infer a data description based on sampled data.
      operationId: inferDescription
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InferSchemaDescriptionRequest"
        required: true
      responses:
        "200":
          description: Returns an inferred description.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InferredDescriptionResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /infer/schema:
    post:
      tags:
        - ingest
      summary: Schema
      description: Ask an agent to infer a schema based on sampled data.
      operationId: inferSchema
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InferSchemaDescriptionRequest"
        required: true
      responses:
        "200":
          description: Returns the inferred schema.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InferredSchemaResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /ingest/new/{namespace}/{datasetName}:
    post:
      tags:
        - ingest
        - datasets
      summary: Create new dataset
      description: Creates a new dataset within a specified namespace.
      operationId: createDataset
      parameters:
        - name: namespace
          in: path
          description: Namespace for the dataset.
          required: true
          schema:
            type: string
          example: cinematography
        - name: datasetName
          in: path
          description: Name of the dataset.
          required: true
          schema:
            type: string
          examples:
            movies:
              summary: Movies
              value: movies
            actors:
              summary: Actors
              value: actors
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDatasetRequest"
        required: true
      responses:
        "201":
          description: Creates a new dataset.
        "401":
          $ref: "#/components/responses/Unauthorized"
  /ingest/{namespace}/{datasetName}:
    post:
      tags:
        - ingest
      summary: Ingest data
      description: Load data into the specified dataset.
      operationId: ingestData
      parameters:
        - name: namespace
          in: path
          description: Namespace for the dataset.
          required: true
          schema:
            type: string
          example: cinematography
        - name: datasetName
          in: path
          description: Name of the dataset.
          required: true
          schema:
            type: string
          examples:
            movies:
              summary: Movies
              value: movies
            actors:
              summary: Actors
              value: actors
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IngestRequest"
            examples:
              movies:
                $ref: "#/components/examples/moviesExample"
              actors:
                $ref: "#/components/examples/actorsExample"
              unstructured:
                $ref: "#/components/examples/unstructuredExample"
        required: true
      responses:
        "200":
          description: Returns the ingestion result.
        "401":
          $ref: "#/components/responses/Unauthorized"
  /ingestionTracking/{ingestionId}/retry:
    post:
      tags:
        - ingestionTracking
      summary: Retry ingestion
      description: Creates a new ingestion record copying data from the original and starts the ingestion process in the background. Returns the new ingestion ID.
      operationId: retryIngestion
      parameters:
        - name: ingestionId
          in: path
          description: Ingestion ID
          required: true
          schema:
            type: string
      responses:
        "201":
          description: New ingestion created and started successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreatedIngestionTrackingResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /ingestionTracking/{ingestionId}/seen:
    post:
      tags:
        - ingestionTracking
      summary: Mark ingestion as seen
      description: Update seenAt timestamp for the specified ingestion.
      operationId: markIngestionSeen
      parameters:
        - name: ingestionId
          in: path
          description: Ingestion ID
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Ingestion marked as seen successfully.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /links/{username}/{namespace}/{datasetName}:
    get:
      tags:
        - links
      summary: Load links
      description: Load the links for the specified dataset.
      operationId: getLinks
      parameters:
        - name: namespace
          in: path
          description: Namespace for the dataset.
          required: true
          schema:
            type: string
          example: cinematography
        - name: datasetName
          in: path
          description: Name of the dataset.
          required: true
          schema:
            type: string
          examples:
            movies:
              summary: Movies
              value: movies
            actors:
              summary: Actors
              value: actors
        - name: username
          in: path
          description: The username associated with the request.
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Returns the links for the specified dataset.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IngestLinksResponse"
        "204":
          description: There are no links associated with the specified dataset.
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags:
        - links
      summary: Rebuild links
      description: Recalculate links for a specified dataset.
      operationId: rebuildLinks
      parameters:
        - name: namespace
          in: path
          description: Namespace for the dataset.
          required: true
          schema:
            type: string
          example: cinematography
        - name: datasetName
          in: path
          description: Name of the dataset.
          required: true
          schema:
            type: string
          examples:
            movies:
              summary: Movies
              value: movies
            actors:
              summary: Actors
              value: actors
        - name: username
          in: path
          description: The username associated with the request.
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IngestLinksRequest"
        required: true
      responses:
        "200":
          description: Returns the recalculated links.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IngestLinksResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Forbidden. The user does not have access to the dataset.
  /links/preview/{username}/{namespace}/{datasetName}:
    post:
      tags:
        - links
      summary: Preview links
      description: Shows what recalculating links would look like without saving changes.
      operationId: previewLinks
      parameters:
        - name: namespace
          in: path
          description: Namespace for the dataset.
          required: true
          schema:
            type: string
          example: cinematography
        - name: datasetName
          in: path
          description: Name of the dataset.
          required: true
          schema:
            type: string
          examples:
            movies:
              summary: Movies
              value: movies
            actors:
              summary: Actors
              value: actors
        - name: username
          in: path
          description: The username associated with the request.
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IngestLinksRequest"
        required: true
      responses:
        "200":
          description: Returns the preview link results.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IngestLinksResponse"
  /links/add:
    post:
      tags:
        - links
      summary: Add a new link
      description: Create a new link between two dataset columns.
      operationId: addLink
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddLinkRequest"
            examples:
              exactMatch:
                summary: Exact match between movie datasets
                value:
                  from:
                    username: johndoe
                    namespace: cinematography
                    dataset: movies
                    columnName: director
                  to:
                    username: janedoe
                    namespace: entertainment
                    dataset: films
                    columnName: director_name
                  matchType: ExactMatch
              geoMatch:
                summary: Geographic match between location datasets
                value:
                  from:
                    username: alice
                    namespace: geography
                    dataset: cities
                    columnName: coordinates
                  to:
                    username: bob
                    namespace: mapping
                    dataset: locations
                    columnName: gps_coords
                  matchType: GeoMatch
        required: true
      responses:
        "200":
          description: "Link existed, no creation required."
        "201":
          description: Creates a new link.
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: The source or target dataset was not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /ontology/{username}/{namespace}/{datasetName}:
    get:
      tags:
        - ontology
      summary: Get dataset ontology
      description: Load the ontology for the specified dataset.
      operationId: getConnectedLinks
      parameters:
        - name: namespace
          in: path
          description: Namespace for the dataset.
          required: true
          schema:
            type: string
          example: cinematography
        - name: datasetName
          in: path
          description: Name of the dataset.
          required: true
          schema:
            type: string
          examples:
            movies:
              summary: Movies
              value: movies
            actors:
              summary: Actors
              value: actors
        - name: username
          in: path
          description: The username associated with the request.
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Returns the dataset ontology.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OntologyResponse"
        "204":
          description: There is no ontology for the specified dataset.
    post:
      tags:
        - ontology
      summary: Save dataset ontology
      description: Save the ontology for the specified dataset.
      operationId: saveConnections
      parameters:
        - name: namespace
          in: path
          description: Namespace for the dataset.
          required: true
          schema:
            type: string
          example: cinematography
        - name: datasetName
          in: path
          description: Name of the dataset.
          required: true
          schema:
            type: string
          examples:
            movies:
              summary: Movies
              value: movies
            actors:
              summary: Actors
              value: actors
        - name: username
          in: path
          description: The username associated with the request.
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ModifyOntologyRequest"
        required: true
      responses:
        "200":
          description: Saves the dataset ontology.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
