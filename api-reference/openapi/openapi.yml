openapi: 3.0.3
info:
  title: DataLinks
  version: 1.0.0
security:
  - bearerAuth: [ ]
  - openId: [ implicit ]
  - openId-dev: [ implicit ]
servers:
  - url: /api/v1
paths:
  /data:
    $ref: './paths/data.yml#/getDatasets'
  /data/{namespace}:
    $ref: './paths/data.yml#/getDatasetsInNamespace'
  /data/{username}/{namespace}/{datasetName}/ingest/attempts:
    $ref: './paths/data.yml#/listIngestions'
  /data/{username}/{namespace}/{datasetName}:
    $ref: './paths/data.yml#/getDatasetInformation'
  /data/{username}/{namespace}/rename:
    $ref: './paths/data.yml#/renameNamespace'
  /data/{username}/{namespace}/{datasetName}/rename:
    $ref: './paths/data.yml#/renameDataset'
  /data/{username}/{namespace}/{datasetName}/inferDefinition:
    $ref: './paths/data.yml#/updateInferDefinition'
  /data/{username}/{namespace}/{datasetName}/clear:
    $ref: './paths/data.yml#/clearDataset'
  /data/{username}/{namespace}/{datasetName}/balefire:
    $ref: './paths/data.yml#/balefireDataset'
  /ingest/new/{namespace}/{datasetName}:
    $ref: './paths/ingest.yml#/createDataset'
  /ingest/{namespace}/{datasetName}:
    $ref: './paths/ingest.yml#/ingestData'
  /infer/preview:
    $ref: './paths/infer.yml#/previewInfer'
  /infer/description:
    $ref: './paths/infer.yml#/inferDescription'
  /infer/schema:
    $ref: './paths/infer.yml#/inferSchema'
  /agents/cleaning/{cleaningTaskId}/code:
    $ref: './paths/agents.yml#/getCleaningTaskCode'
  /agents/{username}/{namespace}/{datasetName}/requestCleaning:
    $ref: './paths/agents.yml#/requestCleaning'
  /schema/datasets/all:
    $ref: './paths/schema.yml#/listAllDatasets'
  /schema/{user}/namespaces:
    $ref: './paths/schema.yml#/listUserNamespaces'
  /schema/{user}/{namespace}/datasets:
    $ref: './paths/schema.yml#/listDatasetsWithinNamespace'
  /schema/{username}/{namespace}/{datasetName}/sort-order:
    $ref: './paths/schema.yml#/updateSortOrder'
  /query:
    $ref: './paths/query.yml#/queryData'
  /query/autorag:
    $ref: './paths/query.yml#/autorag'
  /query/ask:
    $ref: './paths/query.yml#/autoragStream'
  /links/{username}/{namespace}/{datasetName}:
    $ref: './paths/links.yml#/getAndRebuildLinks'
  /links/preview/{username}/{namespace}/{datasetName}:
    $ref: './paths/links.yml#/previewLinks'
  /links/add:
    $ref: './paths/links.yml#/addLink'
  /ontology/{username}/{namespace}/{datasetName}:
    $ref: './paths/ontology.yml#/getAndSaveOntology'
  /ontology/curate-links:
    $ref: './paths/ontology.yml#/curateLinks'
  /user/tokens:
    $ref: './paths/user.yml#/listTokens'
  /user/token:
    $ref: './paths/user.yml#/addToken'
  /user/token/{tokenId}:
    $ref: './paths/user.yml#/deleteToken'
  /user/tokens/{tokenId}/permissions:
    $ref: './paths/user.yml#/listTokenPermissions'
  /user/usage/history:
    $ref: './paths/user.yml#/getUserUsageHistory'
  /user/usage/by-day:
    $ref: './paths/user.yml#/getUserUsageByDay'
  /upload/multipart/{username}/{namespace}/{datasetName}/prepare:
    $ref: './paths/upload.yml#/prepareMultipartUpload'
  /upload/multipart/{username}/{namespace}/{datasetName}/finish:
    $ref: './paths/upload.yml#/finishMultipartUpload'
  /upload/multipart/{username}/{namespace}/{datasetName}/abort:
    $ref: './paths/upload.yml#/abortMultipartUpload'
  /ingestionTracking/{ingestionId}/retry:
    $ref: './paths/ingestionTracking.yml#/retryIngestion'
  /ingestionTracking/{ingestionId}/seen:
    $ref: './paths/ingestionTracking.yml#/markIngestionSeen'
  /file-upload/prepare:
    $ref: './paths/fileUpload.yml#/prepareFileUpload'
  /file-upload/{sessionId}/files/{fileId}/finish:
    $ref: './paths/fileUpload.yml#/finishFileUpload'
  /file-upload/{sessionId}/abort:
    $ref: './paths/fileUpload.yml#/abortFileUpload'
  /file-upload/{sessionId}/files:
    $ref: './paths/fileUpload.yml#/listSessionFiles'
components:
  parameters:
    DatasetName:
      $ref: './components.yml#/components/parameters/DatasetName'
    Namespace:
      $ref: './components.yml#/components/parameters/Namespace'
    Username:
      $ref: './components.yml#/components/parameters/Username'
    PageSize:
      $ref: './components.yml#/components/parameters/PageSize'
    PermissionId:
      $ref: './components.yml#/components/parameters/PermissionId'
    TimeRangeOnOrAfter:
      $ref: './components.yml#/components/parameters/TimeRangeOnOrAfter'
    TimeRangeBefore:
      $ref: './components.yml#/components/parameters/TimeRangeBefore'
  schemas:
    DataArray:
      $ref: './components.yml#/components/schemas/DataArray'
    IngestRequest:
      $ref: './components.yml#/components/schemas/IngestRequest'
    IngestRequestInfer:
      $ref: './components.yml#/components/schemas/IngestRequestInfer'
    IngestRequestInferStep:
      $ref: './components.yml#/components/schemas/IngestRequestInferStep'
    TableStep:
      $ref: './components.yml#/components/schemas/TableStep'
    RowsStep:
      $ref: './components.yml#/components/schemas/RowsStep'
    NormaliseStep:
      $ref: './components.yml#/components/schemas/NormaliseStep'
    ValidateStep:
      $ref: './components.yml#/components/schemas/ValidateStep'
    ReverseGeoStep:
      $ref: './components.yml#/components/schemas/ReverseGeoStep'
    NamedEntitiesStep:
      $ref: './components.yml#/components/schemas/NamedEntitiesStep'
    ExactMatchConfig:
      $ref: './components.yml#/components/schemas/ExactMatchConfig'
    GeoMatchConfig:
      $ref: './components.yml#/components/schemas/GeoMatchConfig'
    DataDescription:
      $ref: './components.yml#/components/schemas/DataDescription'
    SchemaDefinition:
      $ref: './components.yml#/components/schemas/SchemaDefinition'
    ApiDatasetDescription:
      $ref: './components.yml#/components/schemas/ApiDatasetDescription'
    DatasetsResponse:
      $ref: './components.yml#/components/schemas/DatasetsResponse'
    ApiLink:
      $ref: './components.yml#/components/schemas/ApiLink'
    ErrorResponse:
      $ref: './components.yml#/components/schemas/ErrorResponse'
    CreatedIngestionTrackingResponse:
      $ref: './components.yml#/components/schemas/CreatedIngestionTrackingResponse'
    CleanerAgentCodeFilesResponse:
      $ref: './paths/agents.yml#/components/schemas/CleanerAgentCodeFilesResponse'
    RequestCleaningResponse:
      $ref: './paths/agents.yml#/components/schemas/RequestCleaningResponse'
  responses:
    BadRequest:
      $ref: './components.yml#/components/responses/BadRequest'
    Forbidden:
      $ref: './components.yml#/components/responses/Forbidden'
    ListOfDatasets:
      $ref: './components.yml#/components/responses/ListOfDatasets'
    NotFound:
      $ref: './components.yml#/components/responses/NotFound'
    Unauthorized:
      $ref: './components.yml#/components/responses/Unauthorized'
    UnprocessableContent:
      $ref: './components.yml#/components/responses/UnprocessableContent'
  securitySchemes:
    bearerAuth:
      $ref: './components.yml#/components/securitySchemes/bearerAuth'
    openId-dev:
      $ref: './components.yml#/components/securitySchemes/openId-dev'
    openId:
      $ref: './components.yml#/components/securitySchemes/openId'
  examples:
    moviesExample:
      $ref: './components.yml#/components/examples/moviesExample'
    actorsExample:
      $ref: './components.yml#/components/examples/actorsExample'
