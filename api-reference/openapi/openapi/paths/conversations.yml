listConversations:
  get:
    summary: List the caller's conversations within a namespace
    description: |
      Returns the caller's conversations in the given namespace, most-recently-updated first.
      A conversation groups the agent runs (turns) the user sees as a single thread.
    operationId: listConversations
    tags:
      - conversations
    parameters:
      - name: username
        in: query
        required: true
        schema:
          type: string
      - name: namespace
        in: query
        required: true
        schema:
          type: string
    responses:
      '200':
        description: The caller's conversations.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConversationListResponse'
      '401':
        $ref: '../components.yml#/components/responses/Unauthorized'
      '404':
        $ref: '../components.yml#/components/responses/NotFound'

getConversation:
  get:
    summary: Get a conversation and its turns
    description: |
      Returns the conversation's turns (oldest first), each with the original question, its
      status, and — for completed turns — the rendered result. Returns 404 for both
      "never existed" and "owned by someone else" to avoid leaking existence of other
      users' conversations.
    operationId: getConversation
    tags:
      - conversations
    parameters:
      - name: conversationId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    responses:
      '200':
        description: The conversation and its turns.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConversationDetailResponse'
      '401':
        $ref: '../components.yml#/components/responses/Unauthorized'
      '404':
        $ref: '../components.yml#/components/responses/NotFound'

components:
  schemas:
    ConversationSummaryResponse:
      type: object
      required: [id, title, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        createdAt:
          type: integer
          format: int64
          description: Creation time as epoch milliseconds.
        updatedAt:
          type: integer
          format: int64
          description: Last-updated time as epoch milliseconds.

    ConversationListResponse:
      type: object
      required: [conversations]
      properties:
        conversations:
          type: array
          items:
            $ref: '#/components/schemas/ConversationSummaryResponse'

    ConversationTurnResponse:
      type: object
      required: [runId, question, status]
      properties:
        runId:
          type: string
          format: uuid
        question:
          type: string
        status:
          type: string
          enum: [running, completed, failed, expired]
        result:
          type: object
          additionalProperties: true
          description: Rendered AutoRag result for completed turns, in the same shape as `POST /query/autorag`'s response body.

    ConversationDetailResponse:
      type: object
      required: [id, title, turns]
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        turns:
          type: array
          items:
            $ref: '#/components/schemas/ConversationTurnResponse'
