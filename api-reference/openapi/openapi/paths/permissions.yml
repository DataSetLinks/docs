datasetShares:
  post:
    summary: Share a dataset with a user
    description: Grant another user viewer or editor access to a dataset. Only the dataset owner may share.
    operationId: shareDatasetAccess
    tags:
      - permissions
    parameters:
      - $ref: '../components.yml#/components/parameters/Username'
      - $ref: '../components.yml#/components/parameters/Namespace'
      - $ref: '../components.yml#/components/parameters/DatasetName'
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ShareAccessRequest'
    responses:
      '200':
        description: Access was granted.
      '401':
        $ref: '../components.yml#/components/responses/Unauthorized'
      '403':
        $ref: '../components.yml#/components/responses/Forbidden'
      '404':
        description: The dataset was not found.
      '422':
        $ref: '../components.yml#/components/responses/UnprocessableContent'
  delete:
    summary: Revoke a user's access to a dataset
    description: Remove a previously granted viewer or editor access from a user. Only the dataset owner may revoke.
    operationId: revokeDatasetAccess
    tags:
      - permissions
    parameters:
      - $ref: '../components.yml#/components/parameters/Username'
      - $ref: '../components.yml#/components/parameters/Namespace'
      - $ref: '../components.yml#/components/parameters/DatasetName'
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ShareAccessRequest'
    responses:
      '200':
        description: Access was revoked.
      '401':
        $ref: '../components.yml#/components/responses/Unauthorized'
      '403':
        $ref: '../components.yml#/components/responses/Forbidden'
      '404':
        description: The dataset was not found.
      '422':
        $ref: '../components.yml#/components/responses/UnprocessableContent'
  get:
    summary: List users with access to a dataset
    description: List the per-user grants on a dataset. Only the dataset owner may list.
    operationId: listDatasetShares
    tags:
      - permissions
    parameters:
      - $ref: '../components.yml#/components/parameters/Username'
      - $ref: '../components.yml#/components/parameters/Namespace'
      - $ref: '../components.yml#/components/parameters/DatasetName'
    responses:
      '200':
        $ref: '#/components/responses/ListOfAccessGrants'
      '401':
        $ref: '../components.yml#/components/responses/Unauthorized'
      '403':
        $ref: '../components.yml#/components/responses/Forbidden'
      '404':
        description: The dataset was not found.

namespaceShares:
  post:
    summary: Share a namespace with a user
    description: >
      Grant another user viewer or editor access to a namespace. The grant cascades to all datasets
      within the namespace. Only the namespace owner may share.
    operationId: shareNamespaceAccess
    tags:
      - permissions
    parameters:
      - $ref: '../components.yml#/components/parameters/Username'
      - $ref: '../components.yml#/components/parameters/Namespace'
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ShareAccessRequest'
    responses:
      '200':
        description: Access was granted.
      '401':
        $ref: '../components.yml#/components/responses/Unauthorized'
      '403':
        $ref: '../components.yml#/components/responses/Forbidden'
      '404':
        description: The namespace was not found.
      '422':
        $ref: '../components.yml#/components/responses/UnprocessableContent'
  delete:
    summary: Revoke a user's access to a namespace
    description: Remove a previously granted viewer or editor access from a user. Only the namespace owner may revoke.
    operationId: revokeNamespaceAccess
    tags:
      - permissions
    parameters:
      - $ref: '../components.yml#/components/parameters/Username'
      - $ref: '../components.yml#/components/parameters/Namespace'
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ShareAccessRequest'
    responses:
      '200':
        description: Access was revoked.
      '401':
        $ref: '../components.yml#/components/responses/Unauthorized'
      '403':
        $ref: '../components.yml#/components/responses/Forbidden'
      '404':
        description: The namespace was not found.
      '422':
        $ref: '../components.yml#/components/responses/UnprocessableContent'
  get:
    summary: List users with access to a namespace
    description: List the per-user grants on a namespace. Only the namespace owner may list.
    operationId: listNamespaceShares
    tags:
      - permissions
    parameters:
      - $ref: '../components.yml#/components/parameters/Username'
      - $ref: '../components.yml#/components/parameters/Namespace'
    responses:
      '200':
        $ref: '#/components/responses/ListOfAccessGrants'
      '401':
        $ref: '../components.yml#/components/responses/Unauthorized'
      '403':
        $ref: '../components.yml#/components/responses/Forbidden'
      '404':
        description: The namespace was not found.

components:
  schemas:
    ShareAccessRequest:
      type: object
      properties:
        username:
          type: string
          description: Username of the user to grant or revoke access for.
          example: alice
        role:
          type: string
          enum:
            - viewer
            - editor
          description: Access level. 'viewer' is read-only; 'editor' is read and write.
          example: viewer
      required:
        - username
        - role

    AccessGrant:
      type: object
      properties:
        username:
          type: string
          description: Username of the user that has access.
          example: alice
        role:
          type: string
          enum:
            - viewer
            - editor
          description: Access level granted to the user.
          example: editor
      required:
        - username
        - role

  responses:
    ListOfAccessGrants:
      description: Returns the per-user grants on the resource.
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: '#/components/schemas/AccessGrant'
