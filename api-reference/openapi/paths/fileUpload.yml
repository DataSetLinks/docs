prepareFileUpload:
  post:
    summary: Prepare session for file upload
    description: Initiate a file upload session and get the upload URLs.
    operationId: prepareFileUpload
    tags:
      - fileUpload
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/FileUploadPrepareSessionRequest'
    responses:
      '200':
        description: Returns the file upload session details.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FileUploadPrepareSessionResponse'
      '401':
        $ref: '../components.yml#/components/responses/Unauthorized'
      '403':
        $ref: '../components.yml#/components/responses/Forbidden'

finishFileUpload:
  post:
    summary: Finish file upload
    description: Finish a single file upload
    operationId: finishFileUpload
    tags:
      - fileUpload
    parameters:
      - $ref: '#/components/parameters/SessionId'
      - $ref: '#/components/parameters/FileId'
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/FinishFileUploadRequest'
    responses:
      '200':
        description: Returns the session status and finished file status
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FinishFileUploadResponse'
      '401':
        $ref: '../components.yml#/components/responses/Unauthorized'
      '403':
        $ref: '../components.yml#/components/responses/Forbidden'
      '404':
        $ref: '../components.yml#/components/responses/NotFound'
      '422':
        $ref: '../components.yml#/components/responses/UnprocessableContent'

abortFileUpload:
  post:
    summary: Abort file upload
    description: Abort a single file upload
    operationId: abortFileUpload
    tags:
      - fileUpload
    parameters:
      - $ref: '#/components/parameters/SessionId'
    responses:
      '200':
        description: Returns aborted session status
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AbortFileUploadResponse'
      '401':
        $ref: '../components.yml#/components/responses/Unauthorized'
      '403':
        $ref: '../components.yml#/components/responses/Forbidden'
      '404':
        $ref: '../components.yml#/components/responses/NotFound'
      '422':
        $ref: '../components.yml#/components/responses/UnprocessableContent'

listSessionFiles:
  get:
    summary: List completed files in an upload session
    description: Returns S3 bucket and key for every completed file in the session. Caller must own the session.
    operationId: listSessionFiles
    tags:
      - fileUpload
    parameters:
      - $ref: '#/components/parameters/SessionId'
    responses:
      '200':
        description: Returns the session status and the list of completed files with their S3 locations.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ListSessionFilesResponse'
      '401':
        $ref: '../components.yml#/components/responses/Unauthorized'
      '403':
        $ref: '../components.yml#/components/responses/Forbidden'
      '404':
        $ref: '../components.yml#/components/responses/NotFound'

components:
  parameters:
    SessionId:
      name: sessionId
      in: path
      required: true
      description: The unique identifier of the file upload session.
      schema:
        $ref: '#/components/schemas/UploadSessionId'
    FileId:
      name: fileId
      in: path
      required: true
      description: The unique identifier of the file.
      schema:
        $ref: '#/components/schemas/UploadFileId'

  schemas:
    UploadSessionId:
      type: string
      format: uuid
      description: Unique identifier for the upload session.
      example: 24b49ba0-6b5c-4950-94c1-1622939cc481

    UploadFileId:
      type: string
      format: uuid
      description: Unique identifier for a file
      example: 311fe2cb-1c85-46a4-a8d9-f63a88da44fd

    FileUploadPrepareSessionRequest:
      type: object
      description: A request contaning list of pairs of file names and their sizes.
      properties:
        filesToUpload:
          type: array
          items:
            $ref: '#/components/schemas/FileUploadPrepareSessionRequestFileToUpload'
      required:
        - filesToUpload

    FileUploadPrepareSessionRequestFileToUpload:
      type: object
      description: Information about each file to be uploaded.
      properties:
        filename:
          type: string
          description: Name of the file to be uploaded.
        size:
          type: integer
          format: int64
          description: Size of the file in bytes.
      required:
        - filename
        - size

    FileUploadPrepareSessionResponse:
      type: object
      description: A response containing the upload ID and key for the multipart upload.
      properties:
        sessionId:
          $ref: '#/components/schemas/UploadSessionId'
        files:
          type: array
          items:
            $ref: '#/components/schemas/FileUploadPrepareSessionResponseFileInfo'
      required:
        - sessionId
        - files

    FileUploadPrepareSessionResponseFileInfo:
      type: object
      description: Information about each file to be uploaded.
      properties:
        fileId:
          $ref: '#/components/schemas/UploadFileId'
        uploadId:
          type: string
          description: Upload identifier
        key:
          type: string
          description: Name of the file to be uploaded.
        filename:
          type: string
          description: File name
        partSize:
          type: integer
          format: int64
          description: Size of the part to be uploaded
        presignedUrls:
          type: array
          description: List of presiggned ULR where file has to be uploaded
          items:
            $ref: '#/components/schemas/FileUploadPrepareSessionResponsePresignedInfo'
      required:
        - fileId
        - uploadId
        - key
        - filename
        - partSize
        - presignedUrls

    FileUploadPrepareSessionResponsePresignedInfo:
      type: object
      description: Information about each file to be uploaded.
      properties:
        url:
          type: string
          description: URL for the presigned upload.
        partSize:
          type: integer
          format: int64
          description: Size of the part to be uploaded
      required:
        - url
        - partSize

    FinishFileUploadRequest:
      type: object
      description: A request contaning list of pairs of file names and their sizes.
      properties:
        uploadId:
          type: string
        key:
          type: string
        parts:
          type: array
          items:
            $ref: '#/components/schemas/FinishFileUploadRequestParts'
      required:
        - uploadId
        - key
        - parts

    FinishFileUploadRequestParts:
      type: object
      description: A request contaning list of pairs of file names and their sizes.
      properties:
        partNumber:
          type: integer
        etag:
          type: string
      required:
        - partNumber
        - etag

    FinishFileUploadResponse:
      type: object
      description: A response contaning session and file status information
      properties:
        sessionId:
          $ref: '#/components/schemas/UploadSessionId'
        sessionStatus:
          type: string
          description: Status of the upload session.
          enum: [preparing,completed,aborted]
          example: preparing
        fileId:
          $ref: '#/components/schemas/UploadFileId'
        fileStatus:
          type: string
          description: Status of the file upload.
          enum: [ preparing,completed,aborted ]
          example: completed
      required:
        - sessionId
        - sessionStatus
        - fileId
        - fileStatus

    AbortFileUploadResponse:
      type: object
      description: A response contaning list of pairs of file names and their sizes.
      properties:
        sessionId:
          $ref: '#/components/schemas/UploadSessionId'
        sessionStatus:
          type: string
          description: Status of the upload session.
          enum: [preparing,completed,aborted]
          example: preparing
      required:
        - sessionId
        - sessionStatus

    ListSessionFilesResponse:
      type: object
      description: List of completed files for an upload session.
      properties:
        sessionId:
          $ref: '#/components/schemas/UploadSessionId'
        sessionStatus:
          type: string
          description: Status of the upload session.
          enum: [preparing,completed,aborted]
          example: completed
        files:
          type: array
          items:
            $ref: '#/components/schemas/ListSessionFilesResponseFileInfo'
      required:
        - sessionId
        - sessionStatus
        - files

    ListSessionFilesResponseFileInfo:
      type: object
      description: S3 location of a completed file in the upload session.
      properties:
        fileId:
          $ref: '#/components/schemas/UploadFileId'
        filename:
          type: string
          description: Original filename provided during prepare.
        s3Bucket:
          type: string
          description: S3 bucket containing the uploaded object.
        s3Key:
          type: string
          description: S3 key of the uploaded object.
        fileSize:
          type: integer
          format: int64
          description: Size of the uploaded file in bytes.
      required:
        - fileId
        - filename
        - s3Bucket
        - s3Key
        - fileSize
