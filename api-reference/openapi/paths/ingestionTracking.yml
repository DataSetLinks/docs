retryIngestion:
  post:
    summary: Retry ingestion
    description: Creates a new ingestion record copying data from the original and starts the ingestion process in the background. Returns the new ingestion ID.
    operationId: retryIngestion
    tags:
      - ingestionTracking
    parameters:
      - $ref: '#/components/parameters/IngestionId'
    responses:
      '201':
        description: New ingestion created and started successfully.
        content:
          application/json:
            schema:
              $ref: '../components.yml#/components/schemas/CreatedIngestionTrackingResponse'
      '401':
        $ref: '../components.yml#/components/responses/Unauthorized'
      '404':
        $ref: '../components.yml#/components/responses/NotFound'

markIngestionSeen:
  post:
    summary: Mark ingestion as seen
    description: Update seenAt timestamp for the specified ingestion.
    operationId: markIngestionSeen
    tags:
      - ingestionTracking
    parameters:
      - $ref: '#/components/parameters/IngestionId'
    responses:
      '204':
        description: Ingestion marked as seen successfully.
      '401':
        $ref: '../components.yml#/components/responses/Unauthorized'
      '404':
        $ref: '../components.yml#/components/responses/NotFound'

components:
  parameters:
    IngestionId:
      name: ingestionId
      in: path
      required: true
      description: Ingestion ID
      schema:
        type: string
