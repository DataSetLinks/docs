getAndSaveOntology:
  get:
    summary: Get dataset ontology
    description: Load the ontology for the specified dataset.
    operationId: getConnectedLinks
    tags:
      - ontology
    parameters:
      - $ref: '../components.yml#/components/parameters/Namespace'
      - $ref: '../components.yml#/components/parameters/DatasetName'
      - $ref: '../components.yml#/components/parameters/Username'
    responses:
      '200':
        description: Returns the dataset ontology.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OntologyResponse'
      '204':
        description: There is no ontology for the specified dataset.
  post:
    summary: Save dataset ontology
    description: Save the ontology for the specified dataset.
    operationId: saveConnections
    tags:
      - ontology
    parameters:
      - $ref: '../components.yml#/components/parameters/Namespace'
      - $ref: '../components.yml#/components/parameters/DatasetName'
      - $ref: '../components.yml#/components/parameters/Username'
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ModifyOntologyRequest'
    responses:
      '200':
        description: Saves the dataset ontology.
      '401':
        $ref: '../components.yml#/components/responses/Unauthorized'
      '403':
        $ref: '../components.yml#/components/responses/Forbidden'
      '404':
        $ref: '../components.yml#/components/responses/NotFound'

curateLinks:
  post:
    summary: Curate ontology links
    description: Run the OntologyCurator agent to analyze computed links for a dataset or all datasets in a namespace. When activate is true, the curated links are added to the ontology. When activate is false (default), only returns the curated links without activating them.
    operationId: curateLinks
    tags:
      - ontology
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/CurateLinkRequest'
          examples:
            curateDataset:
              summary: Curate links for a specific dataset (without activating)
              value:
                namespace: "my_namespace"
                dataset: "my_dataset"
            curateAndActivate:
              summary: Curate and activate links
              value:
                namespace: "my_namespace"
                dataset: "my_dataset"
                activate: true
            curateNamespace:
              summary: Curate links for all datasets in a namespace
              value:
                namespace: "my_namespace"
            curateWithModel:
              summary: Curate using a specific LLM model
              value:
                namespace: "my_namespace"
                dataset: "my_dataset"
                model: "gpt-4"
                provider: "openai"
    responses:
      '200':
        description: Links curated successfully
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CurateLinkResponse'
      '401':
        $ref: '../components.yml#/components/responses/Unauthorized'
      '403':
        $ref: '../components.yml#/components/responses/Forbidden'
      '404':
        $ref: '../components.yml#/components/responses/NotFound'

components:
  schemas:
    OntologyResponse:
      type: array
      items:
        $ref: '../components.yml#/components/schemas/ApiLink'

    OntologyRequest:
      type: string
      example: "OntologyObject(\"objectName\").get()"
      description: For details, see [Querying data](/Querying_data).

    ModifyOntologyRequest:
      type: object
      properties:
        add:
          type: array
          items:
            $ref: '../components.yml#/components/schemas/ApiLink'
        remove:
          type: array
          items:
            $ref: '../components.yml#/components/schemas/ApiLink'

    CurateLinkRequest:
      type: object
      description: Request to curate ontology links for a dataset or namespace using the OntologyCurator agent.
      properties:
        namespace:
          type: string
          description: The namespace containing the dataset(s) to curate.
          example: "my_namespace"
        dataset:
          type: string
          description: Optional. If specified, curates links only for this dataset. If omitted, curates all datasets in the namespace.
          example: "my_dataset"
        model:
          type: string
          description: Optional. The LLM model to use for curation (e.g., "gpt-4", "claude-3-5-sonnet-20241022").
          example: "gpt-4"
        provider:
          type: string
          description: Optional. The LLM provider to use (e.g., "openai", "anthropic").
          example: "openai"
        activate:
          type: boolean
          description: Optional. If true, the curated links will be activated (added to the ontology). If false, only returns the curated links without activating them.
          default: false
      required:
        - namespace

    CurateLinkResponse:
      type: object
      description: Response containing curation statistics and optionally the curated links when activate is false.
      properties:
        datasetsProcessed:
          type: integer
          description: Number of datasets that were processed.
          example: 5
        totalSelected:
          type: integer
          description: Total number of links selected by the curator agent.
          example: 45
        curatedLinks:
          type: array
          description: The curated links. Only included in the response when activate is false.
          items:
            $ref: '../components.yml#/components/schemas/ApiLink'
      required:
        - datasetsProcessed
        - totalSelected
