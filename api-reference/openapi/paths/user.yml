listTokens:
  get:
    summary: List user tokens
    description: List all tokens for the authenticated user.
    operationId: listTokens
    tags:
      - user
    responses:
      '200':
        description: Returns the user tokens.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserTokenResponse'

addToken:
  post:
    summary: Add a new user token
    description: Create a new token for the authenticated user.
    operationId: addToken
    tags:
      - user
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/CreateTokenRequest'
    responses:
      '200':
        description: Creates a user token and returns it.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserToken'

deleteToken:
  delete:
    summary: Delete user token
    description: Delete the specified user token.
    operationId: deleteToken
    tags:
      - user
    parameters:
      - $ref: '#/components/parameters/TokenId'
    responses:
      '200':
        description: Deletes the specified token.

listTokenPermissions:
  get:
    summary: List token permissions
    description: List all permissions assigned to the specified token.
    operationId: listTokenPermissions
    tags:
      - user
    parameters:
      - $ref: '#/components/parameters/TokenId'
    responses:
      '200':
        description: Returns the permissions assigned to the token.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenPermissionsResponse'
      '401':
        $ref: '../components.yml#/components/responses/Unauthorized'
      '404':
        $ref: '../components.yml#/components/responses/NotFound'

getUserUsageHistory:
  get:
    summary: Get user usage history
    description: Retrieve historical usage data for the authenticated user.
    operationId: getUserUsageHistory
    tags:
      - user
    parameters:
      - $ref: '#/components/parameters/TimeRangeOnOrAfter'
      - $ref: '#/components/parameters/TimeRangeBefore'
      - $ref: '../components.yml#/components/parameters/PageSize'
      - name: pageCursor
        in: query
        description: Cursor for pagination (JSON object).
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUsageHistoryCursor'
    responses:
      '200':
        description: Returns usage history.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUsageHistoryResponse'
      '401':
        $ref: '../components.yml#/components/responses/Unauthorized'

getUserUsageByDay:
  get:
    summary: Get user usage aggregated by day
    description: Retrieve usage data aggregated by day for the authenticated user, with timezone support.
    operationId: getUserUsageByDay
    tags:
      - user
    parameters:
      - $ref: '#/components/parameters/TimeRangeOnOrAfter'
      - $ref: '#/components/parameters/TimeRangeBefore'
      - name: timeZoneForAggregation
        in: query
        description: Timezone for date aggregation (e.g., "America/New_York", "Europe/London"). Defaults to UTC.
        schema:
          type: string
          default: "UTC"
          example: "America/New_York"
    responses:
      '200':
        description: Returns usage aggregated by day.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUsageByDayResponse'
      '401':
        $ref: '../components.yml#/components/responses/Unauthorized'

components:
  parameters:
    TokenId:
      name: tokenId
      in: path
      required: true
      description: Token ID
      schema:
        type: string
    TimeRangeOnOrAfter:
      name: onOrAfter
      in: query
      description: Return records on or after this timestamp.
      schema:
        type: string
        format: date-time
        example: "2021-01-01T00:00:00.000Z"
    TimeRangeBefore:
      name: before
      in: query
      description: Return records before this timestamp.
      schema:
        type: string
        format: date-time
        example: "2021-12-31T23:59:59.999Z"

  schemas:
    UserToken:
      type: object
      properties:
        created_at:
          type: string
        expires_at:
          type: string
        id:
          type: string
        last_used_at:
          type: string
        name:
          type: string
        token:
          type: string
          nullable: true
      required:
        - id
        - name
        - created_at
        - expires_at
        - token

    UserTokenResponse:
      type: array
      items:
        $ref: '#/components/schemas/UserToken'

    CreateTokenRequest:
      type: object
      properties:
        expires_at:
          type: string
        name:
          type: string
        accessRestrictedTo:
          type: array
          items:
            $ref: '#/components/schemas/TokenPermissionEntry'
          required:
            - datasets
            - namespaces
      required:
        - name

    TokenPermissionEntry:
      type: object
      properties:
        username:
          type: string
        namespace:
          type: string
        dataset:
          type: string
      required:
        - username
        - namespace

    TokenPermissionsResponse:
      type: object
      properties:
        restricted:
          type: boolean
        permissions:
          type: array
          items:
            $ref: '#/components/schemas/TokenPermissionEntry'
      required:
        - restricted

    UserUsageHistoryResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/UserUsageHistoryItem'
        meta:
          $ref: '#/components/schemas/UserUsageHistoryMeta'
      required:
        - data
        - meta

    UserUsageHistoryItem:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
          description: The timestamp of the usage record.
          example: "2021-01-01T12:12:12.000Z"
        tokensUsed:
          type: integer
          format: int64
          description: Number of tokens used.
          example: 1241
        costUSD:
          type: number
          format: double
          description: Cost in USD for this usage.
          example: 0.0001
      required:
        - timestamp
        - tokensUsed
        - costUSD

    UserUsageHistoryCursor:
      type: object
      properties:
        lastStartTime:
          type: string
          format: date-time
          description: The start time of the last observation in the current page.
          example: "2021-01-01T12:12:12.000Z"
        lastObservationId:
          type: string
          description: The observation ID of the last observation in the current page.
          example: "obs_12345"
      required:
        - lastStartTime
        - lastObservationId

    UserUsageHistoryMeta:
      type: object
      properties:
        pageCursor:
          $ref: '#/components/schemas/UserUsageHistoryCursor'
          description: Cursor for fetching the next page of results.
        pageSize:
          type: integer
          description: Number of items per page.
          example: 100
      required:
        - pageSize

    UserUsageByDayResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/UserUsageByDayItem'
        meta:
          $ref: '#/components/schemas/UserUsageByDayMeta'
      required:
        - data
        - meta

    UserUsageByDayItem:
      type: object
      properties:
        date:
          type: string
          format: date
          description: The day of the aggregated usage.
          example: 2021-01-21
        tokensUsed:
          type: integer
          format: int64
          description: Total number of tokens used in this day.
          example: 125000
        costUSD:
          type: number
          format: double
          description: Total cost in USD for this day.
          example: 12.50
      required:
        - date
        - tokensUsed
        - costUSD

    UserUsageByDayMeta:
      type: object
      properties:
        timeZoneForAggregation:
          type: string
          description: The timezone used for date aggregation.
          example: "America/New_York"
      required:
        - timeZoneForAggregation
